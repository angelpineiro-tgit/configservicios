server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: curso
          uri: lb://curso-service
          predicates:
            - Path=/curso/**

        - id: formacion
          uri: lb://formacion-service
          predicates:
            - Path=/formacion/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
